[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
cache_path = "cache"
gas_reports = ["*"]
remappings = [
    "@shared/=../../shared/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/"
]

# RPC Endpoints for BNB Chain
[rpc_endpoints]
bnb_testnet = "https://data-seed-prebsc-1-s1.binance.org:8545"
bnb_mainnet = "https://bsc-dataseed.binance.org/"

# Etherscan verification
[etherscan]
bnb_testnet = { key = "${BSCSCAN_API_KEY}" }
bnb_mainnet = { key = "${BSCSCAN_API_KEY}" }
